<!-- ============================================
     #MOBILE MENU — drawer fullscreen na mobile
     
     Struktura analogiczna do desktop nav, ale:
     - Pozycje z mega-menu / mini-dropdown jako <details><summary>
       (zwijane grupy)
     - Linki top-level jako proste <a>
     - Stopka z phone + main CTA
     
     Hamburger w site-header otwiera/zamyka przez funkcję toggleMobileMenu()
     - moduł `scripts/modules/mobile-menu.js`.
     ============================================ -->

<aside class="mobile-menu" id="mobile-menu" hidden aria-label="Mobile navigation">
  <div class="mobile-menu__inner">
    <nav class="mobile-menu__nav" aria-label="Mobile main navigation">
