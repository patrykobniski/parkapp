<!-- ============================================
     #CONSULTATION MODAL — opcjonalny modal kontaktu
     
     Używaj gdy projekt korzysta z modalu (zamiast osobnej podstrony kontaktu).
     Modal otwiera się po kliknięciu w button [data-open-consultation-modal]
     - moduł `scripts/modules/consultation-modal.js`.
     
     Jeśli projekt nie używa modalu - usuń ten plik i usuń markery
     `<!-- BEGIN PARTIAL: consultation-modal -->` z plików HTML.
     ============================================ -->

<div class="consultation-modal" id="consultation-modal" hidden role="dialog" aria-modal="true" aria-labelledby="consultation-modal-title">
  <div class="consultation-modal__backdrop" data-close-consultation-modal></div>
  <div class="consultation-modal__panel">
    <button class="consultation-modal__close" data-close-consultation-modal aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <header class="consultation-modal__header">
      <p class="eyebrow">[BRAK: eyebrow]</p>
      <h2 class="h-2" id="consultation-modal-title">[BRAK: tytuł modalu]</h2>
      <p class="lead">[BRAK: opis pod tytułem]</p>
    </header>

    <form class="consultation-modal__form" action="#" method="post" novalidate>
      <!-- [BRAK: pola formularza - dopasuj do potrzeb projektu] -->
      <div class="field">
        <label class="field__label" for="modal-name">[BRAK: label]</label>
        <input class="field__input" id="modal-name" type="text" name="name" required>
      </div>
      <!-- ... -->

      <button type="submit" class="btn btn--primary btn--lg" style="width:100%;justify-content:center;">
        [BRAK: tekst submit]
      </button>
    </form>
  </div>
</div>
